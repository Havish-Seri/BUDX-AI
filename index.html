<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Interface</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; position: absolute; z-index: 1; }
        
        /* Existing Webcam Feed */
        .webcam-feed {
            position: fixed; top: 20px; right: 20px; width: 280px;
            border: 2px solid #00d2ff; border-radius: 12px; z-index: 100;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); background: black;
        }
        .webcam-feed img { width: 100%; border-radius: 10px; display: block; }

        /* NEW: Chat Interface */
        .chat-container {
            position: fixed; bottom: 100px; left: 20px; width: 320px; height: 400px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 15px;
            display: flex; flex-direction: column; z-index: 100; color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.9em; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 85%; }
        .user-msg { background: rgba(0, 210, 255, 0.2); align-self: flex-end; margin-left: auto; border: 1px solid #00d2ff; }
        .ai-msg { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border: 1px solid rgba(255,255,255,0.2); }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        #chat-input { 
            flex: 1; background: transparent; border: none; color: white; 
            outline: none; padding: 5px; font-family: inherit;
        }
        
        .ui-controls {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 10;
        }
        .btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

<div class="webcam-feed">
    <img src="/video_feed">
</div>

<div class="chat-container">
    <div class="chat-messages" id="chat-box">
        <div class="message ai-msg">Core Systems Online. How can I assist?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Enter command..." autocomplete="off">
    </div>
</div>

<div class="ui-controls">
    <div class="btn" style="color: #ff4444;">✕</div>
    <div class="btn" style="color: white;">●</div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- YOUR ORIGINAL SHADERS & SCENE START ---
const vertexShader = `
    varying vec2 vUv;
    uniform float uTime;
    uniform vec2 uMouse;
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
    float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 sig = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
        p0 *= sig.x; p1 *= sig.y; p2 *= sig.z; p3 *= sig.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }
    void main() {
        vUv = uv;
        float noise = snoise(vec3(position.xyz * 1.5 + uTime * 0.5));
        float dist = distance(uv, uMouse);
        float mouseForce = smoothstep(0.5, 0.0, dist) * 0.2;
        vec3 newPosition = position + normal * (noise * 0.15 + mouseForce);
        vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
        gl_PointSize = 3.0 * (1.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragmentShader = `
    void main() {
        float strength = distance(gl_PointCoord, vec2(0.5));
        strength = 1.0 - step(0.5, strength);
        vec3 color = vec3(0.0, 0.8, 1.0);
        gl_FragColor = vec4(color, strength);
    }
`;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const geometry = new THREE.IcosahedronGeometry(1, 70); 
const material = new THREE.ShaderMaterial({
    vertexShader, fragmentShader, transparent: true,
    uniforms: { uTime: { value: 0 }, uMouse: { value: new THREE.Vector2(0.5, 0.5) } }
});
const points = new THREE.Points(geometry, material);
scene.add(points);
// --- YOUR ORIGINAL SHADERS & SCENE END ---

// SOCKET CONNECTION
const socket = io();
socket.on('hand_data', (data) => {
    material.uniforms.uMouse.value.x = data.x;
    material.uniforms.uMouse.value.y = 1.0 - data.y;
});

// NEW: Chat Logic
const chatInput = document.getElementById('chat-input');
const chatBox = document.getElementById('chat-box');

chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && chatInput.value.trim() !== "") {
        const userText = chatInput.value;
        appendMessage(userText, 'user-msg');
        socket.emit('chat_message', { message: userText });
        chatInput.value = "";
    }
});

socket.on('chat_response', (data) => {
    appendMessage(data.response, 'ai-msg');
});

function appendMessage(text, className) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${className}`;
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
    const elapsedTime = clock.getElapsedTime();
    material.uniforms.uTime.value = elapsedTime;
    points.rotation.y = elapsedTime * 0.1;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
